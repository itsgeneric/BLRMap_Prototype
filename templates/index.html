<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bengaluru Two-Wheeler Dynamic Router</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            background-color: #f4f4f9;
        }

        #sidebar {
            width: 360px;
            background: white;
            padding: 20px;
            box-shadow: 2px 0 8px rgba(0,0,0,0.12);
            z-index: 10;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        #map { flex-grow: 1; height: 100%; }

        h2 { color: #1a1a2e; font-size: 1.4rem; }

        label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #444;
            display: block;
            margin-bottom: 4px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: border 0.2s;
        }

        input[type="text"]:focus {
            border-color: #1E88E5;
            outline: none;
        }

        /* Traffic radio group */
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border: 1.5px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            transition: border 0.2s, background 0.2s;
        }

        .radio-option:has(input:checked) {
            border-color: #1E88E5;
            background: #e3f2fd;
        }

        .radio-option label {
            font-weight: 500;
            font-size: 0.88rem;
            color: #333;
            cursor: pointer;
            margin: 0;
        }

        /* Buttons */
        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #1E88E5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-primary:hover { background: #1565C0; }
        .btn-primary:disabled { background: #90CAF9; cursor: not-allowed; }

        /* Loading state */
        #loading {
            display: none;
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            padding: 8px;
        }

        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid #ddd;
            border-top-color: #1E88E5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Comparison panel */
        #comparison {
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        .comp-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .route-card {
            border-radius: 10px;
            padding: 12px 14px;
            border-left: 4px solid;
        }

        .route-card.standard {
            background: #e8eaf6;
            border-color: #3949AB;
        }

        .route-card.shortcut {
            background: #fce4ec;
            border-color: #E53935;
        }

        .route-card h4 {
            font-size: 0.88rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .route-card.standard h4 { color: #3949AB; }
        .route-card.shortcut h4 { color: #E53935; }

        .route-stats {
            display: flex;
            gap: 16px;
        }

        .stat { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.72rem; color: #777; }
        .stat-value { font-size: 1.1rem; font-weight: 700; color: #222; }

        .saving-badge {
            display: inline-block;
            background: #e8f5e9;
            color: #2e7d32;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 20px;
            margin-top: 6px;
        }

        .legend {
            display: flex;
            gap: 14px;
            font-size: 0.8rem;
            color: #555;
        }

        .legend-dot {
            display: inline-block;
            width: 12px; height: 12px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
        }

        /* Error */
        #error-msg {
            display: none;
            background: #ffebee;
            color: #c62828;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        /* Divider */
        hr { border: none; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>🛵 Dynamic Routing Hub</h2>
    <hr>

    <div>
        <label>Source Location</label>
        <input id="origin-input" type="text" placeholder="e.g., MG Road, Bengaluru">
    </div>

    <div>
        <label>Destination Location</label>
        <input id="dest-input" type="text" placeholder="e.g., Koramangala, Bengaluru">
    </div>

    <div>
        <label>Traffic Environment (Google Maps overlay)</label>
        <div class="radio-group">
            <div class="radio-option">
                <input type="radio" id="empty" name="traffic" value="empty" checked>
                <label for="empty">Empty Traffic</label>
            </div>
            <div class="radio-option">
                <input type="radio" id="realtime" name="traffic" value="realtime">
                <label for="realtime">Real Time</label>
            </div>
            <div class="radio-option">
                <input type="radio" id="congestion" name="traffic" value="congestion">
                <label for="congestion">Simulate Congestion (Peak Hour)</label>
            </div>
        </div>
    </div>

    <button class="btn-primary" id="calc-btn" onclick="calculateRoute()">
        Calculate & Render Route
    </button>

    <div id="loading">
        <span class="spinner"></span> Calculating routes via OSMnx...
    </div>

    <div id="error-msg"></div>

    <div id="comparison">
        <hr>
        <div class="comp-title">Route Comparison</div>

        <div class="legend">
            <span><span class="legend-dot" style="background:#3949AB"></span>Standard Route</span>
            <span><span class="legend-dot" style="background:#E53935"></span>Two-Wheeler Shortcut</span>
        </div>

        <div class="route-card standard">
            <h4>Standard Route (Main Roads)</h4>
            <div class="route-stats">
                <div class="stat">
                    <span class="stat-label">Distance</span>
                    <span class="stat-value" id="std-dist">--</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Est. Time</span>
                    <span class="stat-value" id="std-time">--</span>
                </div>
            </div>
        </div>

        <div class="route-card shortcut">
            <h4>Two-Wheeler Shortcut (Small Roads)</h4>
            <div class="route-stats">
                <div class="stat">
                    <span class="stat-label">Distance</span>
                    <span class="stat-value" id="tw-dist">--</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Est. Time</span>
                    <span class="stat-value" id="tw-time">--</span>
                </div>
            </div>
            <div id="saving-badge" class="saving-badge" style="display:none"></div>
        </div>
    </div>
</div>

<div id="map"></div>

<script>
    let map;
    let trafficLayer;
    let originPlaceId = null;
    let destPlaceId   = null;
    let stdPolyline   = null;
    let twPolyline    = null;
    let markers       = [];

    function initMap() {
        map = new google.maps.Map(document.getElementById("map"), {
            center: { lat: 12.9716, lng: 77.5946 },
            zoom: 12,
            mapTypeControl: false,
        });

        trafficLayer = new google.maps.TrafficLayer();

        const originInput = document.getElementById("origin-input");
        const destInput   = document.getElementById("dest-input");

        const originAC = new google.maps.places.Autocomplete(originInput, {
            componentRestrictions: { country: "in" },
            fields: ["place_id", "geometry", "name"]
        });
        const destAC = new google.maps.places.Autocomplete(destInput, {
            componentRestrictions: { country: "in" },
            fields: ["place_id", "geometry", "name"]
        });

        originAC.addListener("place_changed", () => {
            const p = originAC.getPlace();
            if (p.place_id) originPlaceId = p.place_id;
        });
        destAC.addListener("place_changed", () => {
            const p = destAC.getPlace();
            if (p.place_id) destPlaceId = p.place_id;
        });
    }

    function clearMap() {
        if (stdPolyline) { stdPolyline.setMap(null); stdPolyline = null; }
        if (twPolyline)  { twPolyline.setMap(null);  twPolyline  = null; }
        markers.forEach(m => m.setMap(null));
        markers = [];
    }

    function showError(msg) {
        const el = document.getElementById("error-msg");
        el.textContent = msg;
        el.style.display = "block";
    }

    function hideError() {
        document.getElementById("error-msg").style.display = "none";
    }

    async function calculateRoute() {
        hideError();

        const origin = document.getElementById("origin-input").value.trim();
        const dest   = document.getElementById("dest-input").value.trim();

        if (!origin || !dest) {
            showError("Please enter both source and destination.");
            return;
        }

        // Traffic layer toggle
        const trafficMode = document.querySelector('input[name="traffic"]:checked').value;
        trafficLayer.setMap(trafficMode !== "empty" ? map : null);

        // Show loading
        const btn = document.getElementById("calc-btn");
        btn.disabled = true;
        document.getElementById("loading").style.display = "block";
        document.getElementById("comparison").style.display = "none";
        clearMap();

        try {
            const res = await fetch("/route", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ origin, destination: dest })
            });

            const data = await res.json();

            if (!res.ok) {
                showError(data.error || "Routing failed. Try different locations.");
                return;
            }

            // ── Draw standard route (blue/indigo) ──────────────────────────
            const stdPath = data.standard.coords.map(c => ({ lat: c[0], lng: c[1] }));
            stdPolyline = new google.maps.Polyline({
                path: stdPath,
                geodesic: true,
                strokeColor: "#3949AB",
                strokeOpacity: 0.85,
                strokeWeight: 5,
                map: map
            });

            // ── Draw two-wheeler shortcut (red) ────────────────────────────
            const twPath = data.shortcut.coords.map(c => ({ lat: c[0], lng: c[1] }));
            twPolyline = new google.maps.Polyline({
                path: twPath,
                geodesic: true,
                strokeColor: "#E53935",
                strokeOpacity: 0.9,
                strokeWeight: 4,
                strokeDashArray: "10 5",
                map: map
            });

            // ── Place A / B markers ────────────────────────────────────────
            const originLatLng = { lat: data.origin.lat, lng: data.origin.lng };
            const destLatLng   = { lat: data.destination.lat, lng: data.destination.lng };

            markers.push(new google.maps.Marker({
                position: originLatLng, map,
                label: { text: "A", color: "white", fontWeight: "bold" },
                title: "Origin"
            }));
            markers.push(new google.maps.Marker({
                position: destLatLng, map,
                label: { text: "B", color: "white", fontWeight: "bold" },
                title: "Destination"
            }));

            // Fit map to show both routes
            const bounds = new google.maps.LatLngBounds();
            [...stdPath, ...twPath].forEach(p => bounds.extend(p));
            map.fitBounds(bounds, { padding: 40 });

            // ── Update comparison panel ────────────────────────────────────
            document.getElementById("std-dist").textContent = data.standard.distance + " km";
            document.getElementById("std-time").textContent = data.standard.time + " mins";
            document.getElementById("tw-dist").textContent  = data.shortcut.distance + " km";
            document.getElementById("tw-time").textContent  = data.shortcut.time + " mins";

            // Show time saving badge if shortcut is faster
            const timeSaved = Math.round(data.standard.time - data.shortcut.time);
            const badge = document.getElementById("saving-badge");
            if (timeSaved > 0) {
                badge.textContent = `⚡ ${timeSaved} mins faster than main road`;
                badge.style.display = "inline-block";
            } else {
                badge.style.display = "none";
            }

            document.getElementById("comparison").style.display = "flex";

        } catch (err) {
            showError("Could not connect to routing server. Make sure router.py is running.");
        } finally {
            btn.disabled = false;
            document.getElementById("loading").style.display = "none";
        }
    }
</script>

<script async defer
    src="https://maps.googleapis.com/maps/api/js?key={{ api_key }}&libraries=places&callback=initMap">
</script>

</body>
</html>
